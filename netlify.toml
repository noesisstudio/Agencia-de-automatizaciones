# Configuración de Netlify — Noesis Web + Chatbot (función serverless)

[build]
publish = "web"

# Funciones serverless: aquí vive el chatbot (guarda la API key, llama a Claude)
[functions]
directory = "netlify/functions"
node_bundler = "esbuild"
# Asegura que el .md de conocimiento se incluya en el paquete de la función
included_files = ["netlify/functions/noesis-conocimiento.md"]
