<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noesis</title>

        <a href="#/dashboard" data-nav="dashboard" class="nav-item is-active">

        <!-- Subir Factura -->

            <line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>

        </a>

        <!-- Configuración -->

          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Configuración</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <a href="https://bynoesis.com/privacidad.html" target="_blank" rel="noopener" style="font-size:.7rem;color:var(--muted);text-decoration:none;opacity:.7;">Privacidad</a>
        <span class="sidebar__version">v2.0</span>
      </div>
    </aside>

    <!-- ─── Mobile Bottom Nav ─── -->
    <nav class="mobile-nav" id="mobile-nav">
      <a href="#/dashboard" data-nav="dashboard" class="mobile-nav__item is-active" aria-label="Dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <rect x="10" y="7" width="4" height="14" rx="1"/>
          <rect x="17" y="3" width="4" height="18" rx="1"/>
        </svg>
        <span>Inicio</span>
      </a>
      <a href="#/invoices" data-nav="invoices" class="mobile-nav__item" aria-label="Facturas">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="13" y2="17"/>
        </svg>
        <span>Facturas</span>
      </a>
      <a href="#/upload" data-nav="upload" class="mobile-nav__item" aria-label="Subir">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Subir</span>
      </a>
      <a href="#/clients" data-nav="clients" class="mobile-nav__item" aria-label="Clientes">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Clientes</span>
      </a>
      <a href="#/settings" data-nav="settings" class="mobile-nav__item" aria-label="Ajustes">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Ajustes</span>
      </a>
    </nav>

    <!-- ─── Main Content Wrap ─── -->
    <div class="app-main-wrap">

      <!-- ─── Topbar ─── -->
      <header class="topbar">
        <button type="button" id="mobile-menu-btn" class="btn btn--icon topbar__menu" aria-label="Menú">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="topbar__search-wrap">
          <svg class="topbar__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="global-search" class="topbar__search" placeholder="Buscar facturas, clientes..." autocomplete="off"/>
        </div>

        <div class="topbar__actions">
          <button type="button" id="theme-toggle" class="btn btn--icon" aria-label="Cambiar tema">
            <svg id="icon-theme-light" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="icon-theme-dark" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>

          <div class="topbar__user">
            <div class="avatar" id="user-avatar">A</div>
            <span id="user-label" class="topbar__username">Admin</span>
          </div>

          <button type="button" id="btn-logout" class="btn btn--ghost btn--sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Salir
          </button>
        </div>
      </header>

      <!-- ─── Main Content Area ─── -->
      <main id="app-main" class="app-main"></main>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LOGIN SCREEN                                       -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="login-only" class="login-only">
    <div class="spinner spinner--lg" aria-label="Cargando…"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MODAL CONTAINER                                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="modal-root" class="modal-root"></div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TOAST CONTAINER                                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="toast-root" class="toast-root"></div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SVG ICON DEFS (reusable via <use>)                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <!-- Plus icon -->
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>
    <!-- Close / X icon -->
    <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </symbol>
    <!-- Chevron right -->
    <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </symbol>
    <!-- Trash -->
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      <line x1="10" y1="11" x2="10" y2="17"/>
      <line x1="14" y1="11" x2="14" y2="17"/>
    </symbol>
    <!-- Edit / Pencil -->
    <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </symbol>
    <!-- Download -->
    <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </symbol>
    <!-- Send / Paper plane -->
    <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </symbol>
    <!-- Eye -->
    <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>
  </svg>

  <script>
    // Runs before the ES-module bundle. Chrome blocks module imports on file://.
    if (location.protocol === 'file:') {
      var _r = document.getElementById('login-only');
      if (_r) {
        _r.innerHTML =
          '<div class="auth-card" style="text-align:center;max-width:440px;padding:2.5rem 2rem">' +
            '<div style="font-size:2rem;margin-bottom:1rem">&#9888;</div>' +
            '<h2 style="margin:0 0 .6rem">Abre desde el servidor</h2>' +
            '<p style="margin:0 0 1.2rem;line-height:1.65;color:var(--muted)">Esta aplicaci&oacute;n no puede abrirse como archivo local.<br>Inicia el servidor backend con:</p>' +
            '<code style="display:block;background:rgba(0,0,0,.06);padding:.7rem 1rem;border-radius:8px;font-size:.85rem;text-align:left;margin-bottom:1.25rem">python backend/run.py</code>' +
            '<p style="margin:0;font-size:.875rem">Luego accede a&nbsp;' +
              '<a href="http://127.0.0.1:8010" style="color:var(--accent);font-weight:600">http://127.0.0.1:8010</a>' +
            '</p>' +
          '</div>';
      }
    }
  </script>
  <script type="module" src="js/app.js?v=20260529-5"></script>
</body>
</html>
