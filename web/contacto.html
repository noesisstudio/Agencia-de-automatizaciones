    <main class="page contact-page">
      <section class="contact-panel contact-layout contact-layout--form-only" data-reveal>
        <form class="diagnosis-form" id="diagnosis-form">
          <label class="field">
            <span data-i18n="site.contact.name">Nombre</span>
            <input name="name" required autocomplete="name" data-i18n-placeholder="site.contact.namePh" placeholder="Tu nombre" />
          </label>
          <label class="field">
            <span data-i18n="site.contact.email">Email</span>
            <input name="email" type="email" required autocomplete="email" data-i18n-placeholder="site.contact.emailPh" placeholder="tu@empresa.com" />
          </label>
          <label class="field">
            <span data-i18n="site.contact.company">Empresa</span>
            <input name="company" required autocomplete="organization" data-i18n-placeholder="site.contact.companyPh" placeholder="Nombre de la empresa" />
          </label>
          <label class="field">
            <span data-i18n="site.contact.phone">Tel&eacute;fono</span>
            <input name="phone" autocomplete="tel" data-i18n-placeholder="site.contact.phonePh" placeholder="+34 ..." />
          </label>
          <label class="field full">
            <span data-i18n="site.contact.service">&iquest;Qu&eacute; servicio Noesis te interesa?</span>
            <select name="service" required>
              <option value="" data-i18n="site.contact.serviceEmpty">Selecciona una opci&oacute;n</option>
              <option data-i18n="site.contact.service1">Diagn&oacute;stico operativo</option>
              <option data-i18n="site.contact.service2">Documentos y facturas</option>
              <option data-i18n="site.contact.service3">Citas y agenda</option>
              <option data-i18n="site.contact.service4">Captaci&oacute;n y seguimiento de leads</option>
              <option data-i18n="site.contact.service5">Gesti&oacute;n inteligente de email</option>
              <option data-i18n="site.contact.service6">Flujos internos</option>
              <option data-i18n="site.contact.service7">Chatbot web o WhatsApp</option>
              <option data-i18n="site.contact.service8">Propuestas por WhatsApp</option>
              <option data-i18n="site.contact.service9">Dashboard y portal cliente</option>
              <option data-i18n="site.contact.service10">Proyecto personalizado o varios sistemas</option>
            </select>
          </label>
          <label class="field full">
            <span data-i18n="site.contact.message">&iquest;Qu&eacute; proceso te gustar&iacute;a ordenar?</span>
            <textarea name="message" rows="5" data-i18n-placeholder="site.contact.messagePh" placeholder="Facturas, agenda, correos, tareas internas..."></textarea>
          </label>
          <label class="consent full">
            <input type="checkbox" required />
            <span data-i18n-html="site.contact.consent">Acepto que Noesis utilice estos datos para responder a mi solicitud. He le&iacute;do la <a href="privacidad.html">pol&iacute;tica de privacidad</a>.</span>
          </label>
          <button class="button primary full" type="submit" data-i18n="site.contact.submit">Solicitar diagn&oacute;stico</button>
          <p class="form-feedback full" id="diagnosis-feedback" aria-live="polite"></p>
        </form>
      </section>
