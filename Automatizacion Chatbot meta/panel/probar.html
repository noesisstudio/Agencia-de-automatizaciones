<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probar — Openix Chatbot</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body class="app-shell chat-page">
  <div class="chat-toolbar">
    <div class="chat-toolbar__inner">
      <span class="chat-toolbar__client" id="tenantLabel">—</span>
      <button type="button" class="btn btn--ghost btn--sm" id="btnDiag">Ver diagnóstico</button>
    </div>
    <input id="tenant" type="hidden" />
  </div>

  <div id="diagBanner" class="diag-box" style="display:none"></div>
  <div id="msgs" class="chat-area"></div>

  <form id="form" class="composer">
    <div class="composer__inner">
      <input id="text" type="text" placeholder="Escribe una pregunta…" autocomplete="off" />
      <button type="submit" class="btn btn--primary">Enviar</button>
    </div>
  </form>

  <script src="panel-ui.js"></script>
  <script src="panel-api.js?v=5"></script>
  <script src="cliente-utils.js"></script>
  <script src="panel-shell.js"></script>
  <script src="probar-app.js"></script>
</body>
</html>
