<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — Openix Chatbot</title>
  <link rel="stylesheet" href="panel.css?v=3" />
</head>
<body class="app-shell">
  <main class="clients-hub">
    <aside class="clients-sidebar">
      <div class="clients-sidebar__head">
        <div>
          <h1>Clientes</h1>
          <p id="clientCount" class="clients-sidebar__count">—</p>
        </div>
        <button type="button" class="btn btn--icon" id="btnRefreshList" title="Actualizar">↻</button>
      </div>
      <div class="search-box">
        <input id="clientSearch" type="search" placeholder="Buscar por nombre o ID…" autocomplete="off" />
      </div>
      <div id="apiStatus" class="api-status" hidden></div>
      <div id="clientList" class="client-list">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
      <button type="button" class="btn btn--primary btn--block" id="btnNewClient">+ Nuevo cliente</button>
    </aside>

    <section class="clients-main">
      <div id="clientWorkspace" class="client-workspace">
        <div class="empty-state">
          <div class="empty-state__icon">◎</div>
          <h2>Selecciona un cliente</h2>
          <p>Elige uno de la lista o crea uno nuevo.</p>
          <button type="button" class="btn btn--primary" id="btnNewEmpty">+ Nuevo cliente</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal crear cliente (siempre en el DOM) -->
  <div id="modalNewClient" class="modal-backdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalNewTitle">
      <div class="modal__head">
        <h2 id="modalNewTitle">Nuevo cliente</h2>
        <button type="button" class="modal__close" id="modalNewClose" aria-label="Cerrar">&times;</button>
      </div>
      <form id="formNewClient" class="modal__body">
        <label for="mNombre">Nombre de la empresa</label>
        <input id="mNombre" name="nombre" placeholder="Ej. Clínica Norte" required autocomplete="off" />
        <label for="mId">ID interno</label>
        <input id="mId" name="tenant_id" placeholder="clinica-norte" autocomplete="off" />
        <p class="field-hint">Letras, números y guiones. Mínimo 2 caracteres.</p>
        <label for="mContacto">Contacto (opcional)</label>
        <input id="mContacto" name="contacto" type="email" autocomplete="off" />
      </form>
      <div class="modal__foot">
        <button type="button" class="btn btn--ghost" id="modalNewCancel">Cancelar</button>
        <button type="submit" form="formNewClient" class="btn btn--primary" id="modalNewSubmit">Crear cliente</button>
      </div>
    </div>
  </div>

  <script src="panel-ui.js?v=5"></script>
  <script src="panel-api.js?v=5"></script>
  <script src="cliente-utils.js?v=5"></script>
  <script src="panel-shell.js?v=5"></script>
  <script src="clientes-app.js?v=5"></script>
</body>
</html>
