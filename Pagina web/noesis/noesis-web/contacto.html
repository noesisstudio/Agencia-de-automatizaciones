    <main class="page contact-page">
      <section class="contact-panel contact-layout contact-layout--form-only" data-reveal>
        <form class="diagnosis-form" id="diagnosis-form">
          <label class="field">
            Nombre
            <input name="name" required autocomplete="name" placeholder="Tu nombre" />
          </label>
          <label class="field">
            Email
            <input name="email" type="email" required autocomplete="email" placeholder="tu@empresa.com" />
          </label>
          <label class="field">
            Empresa
            <input name="company" required autocomplete="organization" placeholder="Nombre de la empresa" />
          </label>
          <label class="field">
            Tel&eacute;fono
            <input name="phone" autocomplete="tel" placeholder="+34 ..." />
          </label>
          <label class="field full">
            &iquest;Qu&eacute; servicio Noesis te interesa?
            <select name="service" required>
              <option value="">Selecciona una opci&oacute;n</option>
              <option>Diagn&oacute;stico operativo</option>
              <option>Documentos y facturas</option>
              <option>Citas y agenda</option>
              <option>Captaci&oacute;n y seguimiento de leads</option>
              <option>Gesti&oacute;n inteligente de email</option>
              <option>Flujos internos</option>
              <option>Chatbot web o WhatsApp</option>
              <option>Propuestas por WhatsApp</option>
              <option>Dashboard y portal cliente</option>
              <option>Proyecto personalizado o varios sistemas</option>
            </select>
          </label>
          <label class="field full">
            &iquest;Qu&eacute; proceso te gustar&iacute;a ordenar?
            <textarea name="message" rows="5" placeholder="Facturas, agenda, correos, tareas internas..."></textarea>
          </label>
          <label class="consent full">
            <input type="checkbox" required />
            <span>Acepto que Noesis utilice estos datos para responder a mi solicitud. He le&iacute;do la <a href="privacidad.html">pol&iacute;tica de privacidad</a>.</span>
          </label>
          <button class="button primary full" type="submit">Solicitar diagn&oacute;stico</button>
          <p class="form-feedback full" id="diagnosis-feedback" aria-live="polite"></p>
        </form>
      </section>
    </main>
