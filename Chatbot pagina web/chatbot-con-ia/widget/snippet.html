<!--
  ============================================================
  SNIPPET BOT B — Pegar antes del </body> en la web del cliente.

  Parámetros a personalizar:
    data-api-url   → URL del backend en Railway (sin barra final)
    data-bot-nombre → Nombre del asistente que verá el usuario
    data-color      → Color principal en hex (marca del cliente)

  Ejemplo real:
    data-api-url="https://bot-b-cliente.up.railway.app"
    data-bot-nombre="Asistente de Clínica Pérez"
    data-color="#2563eb"
  ============================================================
-->
<script
  src="https://TU_CDN_O_DOMINIO/widget.js"
  data-api-url="https://TU_BACKEND.up.railway.app"
  data-bot-nombre="Asistente"
  data-color="#0066cc"
  defer
></script>

<!--
  NOTAS:
  1. El fichero widget.js puede estar alojado en:
     - El mismo Railway del backend (servir como fichero estático)
     - Un CDN propio (Cloudflare R2, Bunny.net)
     - El propio dominio del cliente

  2. Cookies / localStorage que usa el widget (añadir al banner del cliente):
     Nombre: cb_legal_accepted
     Tipo: localStorage
     Duración: Persistente
     Propósito: Funcional — recuerda que el usuario aceptó el aviso de IA
     Proveedor: [Nombre del cliente]

  3. Antes de activar: verificar que ALLOWED_ORIGINS en el .env del backend
     incluye el dominio de la web del cliente.
-->
